services:
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=lms
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=lms
    ports:
      - 5432:5432
    networks:
      - net

  redis:
    image: redis:8.0.0-alpine3.21
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - net

  backend:
    platform: linux/x86_64
#    image: cr.yandex/crpi7be6fcnum9d5jo38/lms-backend:latest
    build: .
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./iam-key.json:/iam-key.json
    depends_on:
      - db
      - redis
    networks:
      - net

networks:
  net:
